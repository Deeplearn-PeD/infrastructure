---
- name: Create Libby directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/kwar-ai/libby
    - /opt/kwar-ai/libby/data

- name: Create Libby environment file
  template:
    src: libby.env.j2
    dest: /opt/kwar-ai/libby/.env
    mode: '0644'
  no_log: true

- name: Copy Libby docker-compose file
  template:
    src: libby-docker-compose.yml.j2
    dest: /opt/kwar-ai/libby/docker-compose.yml
    mode: '0644'

- name: Build and start Libby services
  command: docker-compose up -d --build
  args:
    chdir: /opt/kwar-ai/libby
  register: libby_start
  changed_when: "'Creating' in libby_start.stdout or 'Starting' in libby_start.stdout or 'Built' in libby_start.stdout"

- name: Wait for PostgreSQL to be ready
  command: docker exec libby-postgres pg_isready -U {{ postgres_user }}
  register: pg_ready
  retries: 30
  delay: 5
  until: pg_ready.rc == 0

- name: Wait for Libby API to be healthy
  command: docker exec libby-api curl -sf http://localhost:8000/api/health
  register: result
  retries: 30
  delay: 10
  until: result.rc == 0

- name: Pull Ollama embedding model
  command: docker exec libby-ollama ollama pull {{ embedding_model }}
  register: ollama_pull
  changed_when: "'pulling' in ollama_pull.stdout.lower()"
  failed_when: false
