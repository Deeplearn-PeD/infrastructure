name: Deploy Infrastructure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  validate:
    name: Validate OpenTofu Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.0

      - name: OpenTofu Format Check
        run: tofu fmt -check -recursive

      - name: OpenTofu Init
        run: tofu init
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

      - name: OpenTofu Validate
        run: tofu validate

  plan:
    name: Plan Infrastructure Changes
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.0

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars << EOF
          hcloud_token = "${{ secrets.HCLOUD_TOKEN }}"
          admin_email = "${{ secrets.ADMIN_EMAIL }}"
          postgres_password = "${{ secrets.POSTGRES_PASSWORD }}"
          secret_key = "${{ secrets.SECRET_KEY }}"
          grafana_admin_password = "${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
          openai_api_key = "${{ secrets.OPENAI_API_KEY }}"
          gemini_api_key = "${{ secrets.GEMINI_API_KEY }}"
          zhipu_api_key = "${{ secrets.ZHIPU_API_KEY }}"
          deepseek_api_key = "${{ secrets.DEEPSEEK_API_KEY }}"
          github_client_id = "${{ secrets.GITHUB_CLIENT_ID }}"
          github_client_secret = "${{ secrets.GITHUB_CLIENT_SECRET }}"
          EOF

      - name: OpenTofu Init
        run: tofu init

      - name: OpenTofu Plan
        id: plan
        run: tofu plan -no-color -out=tfplan
        continue-on-error: true

      - name: Post Plan to GitHub PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### OpenTofu Plan 📖
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  apply:
    name: Apply Infrastructure Changes
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://epidbot.kwar-ai.com.br
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.0

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars << EOF
          hcloud_token = "${{ secrets.HCLOUD_TOKEN }}"
          admin_email = "${{ secrets.ADMIN_EMAIL }}"
          postgres_password = "${{ secrets.POSTGRES_PASSWORD }}"
          secret_key = "${{ secrets.SECRET_KEY }}"
          grafana_admin_password = "${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
          openai_api_key = "${{ secrets.OPENAI_API_KEY }}"
          gemini_api_key = "${{ secrets.GEMINI_API_KEY }}"
          zhipu_api_key = "${{ secrets.ZHIPU_API_KEY }}"
          deepseek_api_key = "${{ secrets.DEEPSEEK_API_KEY }}"
          github_client_id = "${{ secrets.GITHUB_CLIENT_ID }}"
          github_client_secret = "${{ secrets.GITHUB_CLIENT_SECRET }}"
          EOF

      - name: OpenTofu Init
        run: tofu init

      - name: OpenTofu Apply
        run: tofu apply -auto-approve

      - name: Get Server IP
        id: server_ip
        run: echo "ip=$(tofu output -raw server_ip)" >> $GITHUB_OUTPUT

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server to be ready..."
          sleep 60

      - name: Setup Ansible
        run: |
          pip install ansible
          ansible-galaxy collection install community.docker community.general

      - name: Create Ansible inventory
        run: |
          cat > ansible/inventory.ini << EOF
          [webservers]
          ${{ steps.server_ip.outputs.ip }} ansible_user=root

          [all:vars]
          ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Run Ansible Playbook
        run: |
          cd ansible
          ansible-playbook -i inventory.ini playbook.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: false

      - name: Health Check
        run: ./scripts/healthcheck.sh

  deploy-services:
    name: Deploy Updated Services
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: apply
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Server IP
        id: server_ip
        run: echo "ip=$(tofu output -raw server_ip)" >> $GITHUB_OUTPUT

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Pull latest Docker images
        run: |
          ssh root@${{ steps.server_ip.outputs.ip }} << 'EOF'
          cd /opt/kwar-ai/libby
          docker-compose pull
          docker-compose up -d
          
          cd /opt/kwar-ai/epidbot
          docker-compose pull
          docker-compose up -d
          
          docker image prune -f
          EOF

      - name: Verify services
        run: |
          curl -f https://epidbot.kwar-ai.com.br/ || exit 1
          curl -f https://libby.kwar-ai.com.br/api/health || exit 1
