---
- name: Create EpidBot directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/kwar-ai/epidbot
    - /opt/kwar-ai/epidbot/data

- name: Create EpidBot data directories with write permissions
  file:
    path: "{{ item }}"
    state: directory
    mode: '0777'
  loop:
    - /opt/kwar-ai/epidbot/data/pysus
    - /opt/kwar-ai/epidbot/data/plots

- name: Create EpidBot environment file
  template:
    src: epidbot.env.j2
    dest: /opt/kwar-ai/epidbot/.env
    mode: '0644'
  no_log: true

- name: Copy EpidBot docker-compose file
  template:
    src: epidbot-docker-compose.yml.j2
    dest: /opt/kwar-ai/epidbot/docker-compose.yml
    mode: '0644'

- name: Build and start EpidBot services
  command: docker-compose up -d --build
  args:
    chdir: /opt/kwar-ai/epidbot
  register: epidbot_start
  changed_when: "'Creating' in epidbot_start.stdout or 'Starting' in epidbot_start.stdout or 'Built' in epidbot_start.stdout"

- name: Wait for EpidBot to be healthy
  uri:
    url: http://localhost:7860/
    method: GET
    status_code: 200
  register: result
  retries: 30
  delay: 10
  until: result.status == 200
