apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://kwar-ai-prometheus:9090
    isDefault: true
    editable: false
    uid: prometheus

  - name: Loki
    type: loki
    access: proxy
    url: http://kwar-ai-loki:3100
    editable: false
    uid: loki
    jsonData:
      maxLines: 1000
