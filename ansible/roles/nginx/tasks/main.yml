---
- name: Create Nginx configuration directory
  file:
    path: /opt/kwar-ai/nginx
    state: directory
    mode: '0755'

- name: Copy Nginx configuration
  template:
    src: nginx.conf.j2
    dest: /opt/kwar-ai/nginx/nginx.conf
    mode: '0644'
  notify: Restart Nginx

- name: Check if SSL certificates exist
  stat:
    path: /opt/kwar-ai/nginx/ssl/fullchain.pem
  register: ssl_cert

- name: Install Certbot
  apt:
    name:
      - certbot
    state: present
    update_cache: yes
  when: not ssl_cert.stat.exists

- name: Obtain SSL certificates with Certbot
  shell: |
    certbot certonly --standalone \
      -d {{ domain_name }} \
      -d {{ epidbot_subdomain }} \
      -d {{ libby_subdomain }} \
      {% if enable_monitoring %}-d {{ grafana_subdomain }} {% endif %} \
      --non-interactive --agree-tos --email {{ admin_email }} \
      --pre-hook "docker stop nginx" \
      --post-hook "docker start nginx"
  args:
    creates: /etc/letsencrypt/live/{{ domain_name }}/fullchain.pem
  when: not ssl_cert.stat.exists

- name: Copy SSL certificates to Nginx directory
  shell: |
    cp /etc/letsencrypt/live/{{ domain_name }}/fullchain.pem /opt/kwar-ai/nginx/ssl/
    cp /etc/letsencrypt/live/{{ domain_name }}/privkey.pem /opt/kwar-ai/nginx/ssl/
    chmod 644 /opt/kwar-ai/nginx/ssl/*.pem
  when: not ssl_cert.stat.exists

- name: Set up certificate renewal cron job
  cron:
    name: "Renew SSL certificates"
    job: "certbot renew --quiet --post-hook 'cp /etc/letsencrypt/live/{{ domain_name }}/*.pem /opt/kwar-ai/nginx/ssl/ && docker restart nginx'"
    minute: "0"
    hour: "0"
    day: "1"
    month: "*"
    weekday: "*"

- name: Pull Nginx Docker image
  docker_image:
    name: nginx
    tag: alpine
    source: pull

- name: Start Nginx container
  docker_container:
    name: nginx-proxy
    image: nginx:alpine
    state: started
    restart_policy: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/kwar-ai/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/kwar-ai/nginx/ssl:/etc/nginx/ssl:ro
      - /var/log/nginx:/var/log/nginx
    networks:
      - name: kwar-ai-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
