---
- name: Create EpidBot directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/kwar-ai/epidbot
    - /opt/kwar-ai/epidbot/data
    - /opt/kwar-ai/epidbot/backups
    - /opt/kwar-ai/epidbot/scripts

- name: Create EpidBot data directories with write permissions
  file:
    path: "{{ item }}"
    state: directory
    mode: '0777'
  loop:
    - /opt/kwar-ai/epidbot/data/pysus
    - /opt/kwar-ai/epidbot/data/plots

- name: Copy EpidBot backup script
  copy:
    src: epidbot-backup.sh
    dest: /opt/kwar-ai/epidbot/scripts/epidbot-backup.sh
    mode: '0755'

- name: Copy EpidBot restore script
  copy:
    src: epidbot-restore.sh
    dest: /opt/kwar-ai/epidbot/scripts/epidbot-restore.sh
    mode: '0755'

- name: Create EpidBot environment file
  template:
    src: epidbot.env.j2
    dest: /opt/kwar-ai/epidbot/.env
    mode: '0644'
  no_log: true

- name: Copy EpidBot docker-compose file
  template:
    src: epidbot-docker-compose.yml.j2
    dest: /opt/kwar-ai/epidbot/docker-compose.yml
    mode: '0644'

- name: Build and start EpidBot services
  command: docker-compose up -d --build
  args:
    chdir: /opt/kwar-ai/epidbot
  register: epidbot_start
  changed_when: "'Creating' in epidbot_start.stdout or 'Starting' in epidbot_start.stdout or 'Built' in epidbot_start.stdout"

- name: Wait for EpidBot container to be running
  command: docker inspect --format={% raw %}'{{.State.Status}}'{% endraw %} epidbot
  register: epidbot_status
  retries: 30
  delay: 10
  until: epidbot_status.stdout == 'running'
  failed_when: false

- name: Wait for EpidBot to be healthy (may take time on first start)
  uri:
    url: http://localhost:7860/
    method: GET
    status_code: 200
  register: result
  retries: 60
  delay: 10
  until: result.status == 200
  failed_when: false

- name: Add cron job to backup DuckDB database
  cron:
    name: "Backup EpidBot DuckDB database"
    job: "/opt/kwar-ai/epidbot/scripts/epidbot-backup.sh backup >> /var/log/epidbot-backup.log 2>&1"
    minute: "0"
    hour: "2"
    day: "*"
    month: "*"
    weekday: "*"

- name: Add cron job to clean old plot files
  cron:
    name: "Clean EpidBot plot files older than 7 days"
    job: "find /opt/kwar-ai/epidbot/data/plots -type f -mtime +7 -delete"
    minute: "0"
    hour: "3"
    day: "*"
    month: "*"
    weekday: "*"
