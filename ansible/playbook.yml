---
- name: Deploy Kwar-AI Infrastructure
  hosts: all
  become: yes
  vars_files:
    - group_vars/all.yml
  
  pre_tasks:
    - name: Wait for server to be ready
      wait_for_connection:
        timeout: 300
    
    - name: Gather facts
      setup:

  roles:
    - role: docker
      tags: [docker, setup]
    
    - role: nginx
      tags: [nginx, web]
    
    - role: libby
      tags: [libby, services]
    
    - role: epidbot
      tags: [epidbot, services]
    
    - role: monitoring
      tags: [monitoring]
      when: enable_monitoring | default(true)

  post_tasks:
    - name: Verify all services are running
      command: docker ps
      register: docker_ps
      changed_when: false
    
    - name: Display running containers
      debug:
        var: docker_ps.stdout_lines
    
    - name: Display deployment information
      debug:
        msg:
          - "Deployment completed successfully!"
          - "EpidBot URL: https://{{ epidbot_subdomain }}"
          - "Libby API URL: https://{{ libby_subdomain }}"
          - "Grafana URL: https://{{ grafana_subdomain }}"
