server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://kwar-ai-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: varlogs
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*log

  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          source: attrs
          expressions:
            tag:
      - regex:
          source: tag
          expression: '([^,]+)'
      - labels:
          tag:
          stream:
      - output:
          source: output

  - job_name: epidbot
    static_configs:
      - targets:
          - localhost
        labels:
          job: epidbot
          service: epidbot
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - docker: {}
      - match:
          selector: '{job="epidbot"}'
          stages:
            - json:
                expressions:
                  log: log
                  stream: stream
                  time: time
            - labels:
                stream:

  - job_name: libby
    static_configs:
      - targets:
          - localhost
        labels:
          job: libby
          service: libby
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - docker: {}
      - match:
          selector: '{job="libby"}'
          stages:
            - json:
                expressions:
                  log: log
                  stream: stream
                  time: time
            - labels:
                stream:
